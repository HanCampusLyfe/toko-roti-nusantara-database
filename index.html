<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roti Nusantara - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #10b981; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); }
        /* Hilangkan scrollbar tapi tetap bisa scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 h-screen overflow-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-emerald-800">
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
        
        <div class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl border border-white/40 relative z-10">
            <div class="text-center mb-10">
                <div class="text-6xl mb-4">🍞</div>
                <h1 class="text-4xl font-black text-emerald-800 tracking-tight">Roti Nusantara</h1>
                <p class="text-slate-500 mt-2 font-medium italic">Sistem Kasir Pintar (POS)</p>
                <div class="h-1 w-16 bg-emerald-500 mx-auto mt-6 rounded-full"></div>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nama Kasir</label>
                    <select id="selectKasir" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none bg-white font-bold text-slate-700 shadow-sm cursor-pointer">
                        <option value="1">Rina Maharani (Kasir Utama)</option>
                        <option value="2">Budi Santoso (Shift Malam)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">PIN Akses</label>
                    <input type="password" id="inputPin" placeholder="••••" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 text-center text-3xl tracking-[0.5em] focus:outline-none shadow-sm">
                </div>
                <button onclick="handleLogin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-[0_8px_30px_rgb(16,185,129,0.3)] transition-all active:scale-95 text-lg mt-4">
                    BUKA KASIR
                </button>
            </div>
        </div>
    </div>

    <div id="posDashboard" class="hidden flex h-full">
        
        <div class="flex-1 flex flex-col bg-slate-50 relative">
            <header class="bg-white px-8 py-4 flex justify-between items-center shadow-sm border-b border-slate-200 z-10">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-emerald-100 rounded-2xl text-emerald-700 text-2xl shadow-sm border border-emerald-200">🍞</div>
                    <div>
                        <h1 class="text-xl font-black text-slate-800 uppercase tracking-tight">Roti Nusantara</h1>
                        <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">
                            <span class="text-emerald-500 flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Live</span> 
                            <span>•</span>
                            <span id="displayClock">00:00:00</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-5">
                    <div class="flex items-center gap-3 bg-slate-50 px-5 py-2 rounded-2xl border border-slate-200 shadow-inner">
                        <div class="text-2xl opacity-70">📈</div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Transaksi (DB)</span>
                            <span id="totalOrderDisplay" class="font-black text-slate-700 text-lg leading-none mt-1">...</span>
                        </div>
                    </div>

                    <div class="h-10 w-px bg-slate-200 mx-2"></div> <div class="text-right">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Kasir Aktif</p>
                        <p id="loggedInCashier" class="font-bold text-emerald-700">---</p>
                    </div>
                    <button onclick="location.reload()" title="Keluar / Ganti Kasir" class="p-3 bg-red-50 hover:bg-red-100 text-red-500 rounded-xl transition-all font-bold text-xl shadow-sm">
                        🚪
                    </button>
                </div>
            </header>

            <div class="px-8 pt-6 pb-2">
                <div class="flex gap-3 overflow-x-auto">
                    <button onclick="setFilter('Semua')" class="filter-btn active bg-slate-800 text-white px-6 py-2.5 rounded-full font-bold shadow-md transition-all">Semua</button>
                    <button onclick="setFilter('Roti')" class="filter-btn bg-white text-slate-600 px-6 py-2.5 rounded-full font-bold shadow-sm hover:bg-slate-100 border border-slate-200 transition-all">🥖 Roti</button>
                    <button onclick="setFilter('Minuman')" class="filter-btn bg-white text-slate-600 px-6 py-2.5 rounded-full font-bold shadow-sm hover:bg-slate-100 border border-slate-200 transition-all">☕ Minuman</button>
                    <button onclick="setFilter('Kue')" class="filter-btn bg-white text-slate-600 px-6 py-2.5 rounded-full font-bold shadow-sm hover:bg-slate-100 border border-slate-200 transition-all">🍰 Kue & Lainnya</button>
                </div>
            </div>

            <div id="syncStatus" class="hidden absolute inset-0 z-50 bg-white/50 backdrop-blur-sm flex items-center justify-center">
                <div class="flex items-center gap-3 text-emerald-600 font-black text-lg bg-white px-8 py-4 rounded-3xl shadow-xl">
                    <div class="w-6 h-6 border-4 border-emerald-500 border-solid rounded-full loader"></div>
                    Menyinkronkan Database...
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-8 pb-8 pt-4">
                <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                    </div>
            </div>
        </div>

        <div class="w-[400px] bg-white border-l border-slate-200 flex flex-col shadow-2xl z-20">
            <div class="p-6 border-b border-slate-100 bg-emerald-50 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-black text-slate-800">🛒 Keranjang</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Struk Pembelian</p>
                </div>
                <button onclick="kosongkanKeranjang()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors">Reset</button>
            </div>

            <div id="cartContainer" class="flex-1 overflow-y-auto p-5 space-y-3 bg-slate-50">
                <div class="h-full flex flex-col items-center justify-center opacity-50">
                    <span class="text-4xl mb-3">🧾</span>
                    <p class="text-center font-bold">Keranjang Kosong</p>
                    <p class="text-xs text-center mt-1">Pilih menu di sebelah kiri</p>
                </div>
            </div>

            <div class="p-6 bg-white border-t border-slate-200 shadow-[0_-10px_20px_rgb(0,0,0,0.03)] relative z-10">
                <div class="space-y-3 mb-6">
                    <div class="flex justify-between text-slate-500 font-semibold">
                        <span>Subtotal</span>
                        <span id="subtotalLabel">Rp 0</span>
                    </div>
                    <div class="flex justify-between text-slate-800 text-xl font-black pt-3 border-t border-slate-200">
                        <span>TOTAL</span>
                        <span id="totalLabel" class="text-emerald-600 text-3xl">Rp 0</span>
                    </div>
                </div>
                <button onclick="prosesCheckout()" id="btnCheckout" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl shadow-[0_8px_20px_rgb(16,185,129,0.2)] transition-all active:scale-95 flex flex-col items-center group overflow-hidden relative">
                    <span class="relative z-10 text-xl">PROSES PEMBAYARAN</span>
                    <span class="relative z-10 text-[9px] opacity-80 uppercase tracking-[0.2em] mt-1 font-bold group-hover:opacity-100 transition-opacity">Simpan ke DB & Notif Telegram</span>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase.js';

        let products = [];
        let cart = [];
        let sessionKasir = "";
        let idKasir = 1;
        let activeFilter = 'Semua';

        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        // 1. LOGIKA LOGIN
        window.handleLogin = () => {
            const pin = document.getElementById('inputPin').value;
            const select = document.getElementById('selectKasir');
            
            if(pin === "1234") { 
                sessionKasir = select.options[select.selectedIndex].text.split('(')[0].trim();
                idKasir = select.value;
                document.getElementById('loggedInCashier').innerText = sessionKasir;
                
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('posDashboard').classList.remove('hidden');
                
                // Panggil data awal
                fetchProducts();
                fetchTotalOrders();
            } else {
                alert("PIN Salah! Coba lagi (Tips PIN: 1234)");
            }
        };

        // Jam Real-time
        setInterval(() => {
            document.getElementById('displayClock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        // 2. FUNGSI BARU: HITUNG TOTAL ORDER DI DATABASE
        async function fetchTotalOrders() {
            try {
                // Query count ke tabel transaksi
                const { count, error } = await supabase.from('transaksi').select('*', { count: 'exact', head: true });
                if (!error) {
                    document.getElementById('totalOrderDisplay').innerText = count + " Struk";
                }
            } catch (err) {
                console.log("Gagal hitung total: ", err);
            }
        }

        // 3. FUNGSI BARU: FILTER KATEGORI
        window.setFilter = (kategori) => {
            activeFilter = kategori;
            
            // Ubah gaya tombol filter
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText.includes(kategori) || (kategori==='Semua' && btn.innerText==='Semua')) {
                    btn.className = "filter-btn active bg-slate-800 text-white px-6 py-2.5 rounded-full font-bold shadow-md transition-all";
                } else {
                    btn.className = "filter-btn bg-white text-slate-600 px-6 py-2.5 rounded-full font-bold shadow-sm hover:bg-slate-100 border border-slate-200 transition-all";
                }
            });
            renderProducts(); // Render ulang sesuai filter
        }

        // 4. AMBIL PRODUK DARI SUPABASE
        async function fetchProducts() {
            const loader = document.getElementById('syncStatus');
            loader.classList.remove('hidden');
            loader.classList.add('flex');
            
            try {
                const { data, error } = await supabase.from('produk').select('*').eq('is_aktif', true);
                if (error) throw error;
                products = data;
                renderProducts();
            } catch (err) {
                alert("Database Error: " + err.message);
            } finally {
                loader.classList.add('hidden');
                loader.classList.remove('flex');
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            // Terapkan Filter
            const produkDitampilkan = activeFilter === 'Semua' 
                ? products 
                : products.filter(p => p.kategori === activeFilter);

            produkDitampilkan.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[24px] p-5 border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-emerald-200 cursor-pointer transition-all flex flex-col group overflow-hidden relative";
                card.onclick = () => addToCart(p);
                
                // Dekorasi Card
                card.innerHTML = `
                    <div class="h-36 bg-slate-100 rounded-2xl mb-4 flex items-center justify-center text-6xl group-hover:bg-emerald-50 transition-colors shadow-inner relative">
                        ${p.kategori === 'Roti' ? '🥖' : p.kategori === 'Minuman' ? '☕' : p.kategori === 'Kue' ? '🍰' : '🍪'}
                        <div class="absolute bottom-2 right-2 bg-white/80 backdrop-blur text-[10px] font-black px-2 py-1 rounded-lg text-emerald-700">Stock: ${p.stok}</div>
                    </div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">${p.kode_produk}</p>
                    <h3 class="font-black text-slate-800 text-[17px] leading-tight mb-4 flex-1">${p.nama_produk}</h3>
                    <div class="border-t border-slate-100 pt-3 flex justify-between items-center group-hover:border-emerald-100 transition-colors">
                        <p class="text-emerald-600 font-black text-xl tracking-tight">${formatRp(p.harga_jual)}</p>
                        <div class="bg-emerald-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow-md">+</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 5. LOGIKA KERANJANG
        window.addToCart = (product) => {
            const existing = cart.find(item => item.id_produk === product.id_produk);
            if (existing) {
                if(existing.jumlah < product.stok) {
                    existing.jumlah += 1;
                    existing.subtotal = existing.jumlah * product.harga_jual;
                } else { alert("Maaf, stok tidak mencukupi!"); }
            } else {
                cart.push({ ...product, jumlah: 1, subtotal: product.harga_jual });
            }
            renderCart();
        };

        window.removeFromCart = (id) => {
            cart = cart.filter(item => item.id_produk !== id);
            renderCart();
        };

        window.kosongkanKeranjang = () => {
            if(confirm("Yakin ingin mereset keranjang?")) {
                cart = [];
                renderCart();
            }
        };

        function renderCart() {
            const container = document.getElementById('cartContainer');
            container.innerHTML = '';
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center opacity-40">
                        <span class="text-6xl mb-4">🛒</span>
                        <p class="text-center font-bold text-lg">Keranjang Kosong</p>
                        <p class="text-xs text-center mt-1">Pilih menu di sebelah kiri</p>
                    </div>`;
                document.getElementById('subtotalLabel').innerText = formatRp(0);
                document.getElementById('totalLabel').innerText = formatRp(0);
                return;
            }
            
            let total = 0;
            cart.forEach(item => {
                total += item.subtotal;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-200 shadow-sm group hover:border-emerald-200 transition-colors";
                div.innerHTML = `
                    <div class="flex-1">
                        <h4 class="font-black text-slate-800 text-[15px] mb-1 leading-tight">${item.nama_produk}</h4>
                        <div class="flex items-center gap-2">
                            <span class="text-emerald-600 font-bold text-sm">${formatRp(item.harga_jual)}</span>
                            <span class="text-slate-300 text-xs">x</span>
                            <span class="font-black text-slate-600">${item.jumlah}</span>
                        </div>
                    </div>
                    <div class="text-right ml-4">
                        <p class="font-black text-slate-800 mb-1">${formatRp(item.subtotal)}</p>
                        <button onclick="removeFromCart(${item.id_produk})" class="text-[10px] uppercase font-bold text-red-400 hover:text-red-600 transition-colors">Hapus</button>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('subtotalLabel').innerText = formatRp(total);
            document.getElementById('totalLabel').innerText = formatRp(total);
        }

        // 6. CHECKOUT (SUPABASE + MAKE.COM / TELEGRAM)
        window.prosesCheckout = async () => {
            if(cart.length === 0) return alert("Keranjang masih kosong!");
            const btn = document.getElementById('btnCheckout');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="text-xl">⏳ MENYIMPAN...</span>`;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const no_trx = 'TRX-' + Math.floor(Date.now() / 1000);
                const total_bayar = cart.reduce((sum, item) => sum + item.subtotal, 0);
                const rincianItems = cart.map(item => `▪️ ${item.nama_produk} (${item.jumlah}x) - ${formatRp(item.subtotal)}`).join('\n');
                const waktuOrder = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });

                // Ke Supabase: Tabel Transaksi
                const { data: trxData, error: trxError } = await supabase.from('transaksi').insert([{
                    no_transaksi: no_trx,
                    id_pegawai: idKasir,
                    tgl_transaksi: new Date().toISOString(),
                    metode_bayar: 'Cash',
                    jumlah_uang: total_bayar,
                    total_bayar: total_bayar,
                    diskon: 0
                }]).select();

                if (trxError) throw trxError;

                // Ke Supabase: Tabel Detail Transaksi
                const detailPayload = cart.map(item => ({
                    id_transaksi: trxData[0].id_transaksi,
                    id_produk: item.id_produk,
                    nama_produk: item.nama_produk,
                    jumlah: item.jumlah,
                    harga_satuan: item.harga_jual,
                    subtotal: item.subtotal
                }));

                const { error: detailError } = await supabase.from('detail_transaksi').insert(detailPayload);
                if (detailError) throw detailError;

                // Ke Telegram via Make.com
                const webhookUrl = 'https://hook.eu1.make.com/mhdwdy95a278uwgt1ctork6683eq8fmi';
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event: 'transaksi_baru',
                        no_transaksi: no_trx,
                        tanggal: waktuOrder,
                        kasir: sessionKasir,
                        total: formatRp(total_bayar),
                        detail_items: rincianItems
                    })
                }).catch(e => console.log("Webhook Info:", e));

                alert(`✅ PEMBAYARAN SUKSES!\n\nStruk: ${no_trx}\nTotal: ${formatRp(total_bayar)}`);
                
                cart = [];
                renderCart();
                fetchTotalOrders(); // Update jumlah struk di pojok kanan atas!

            } catch (err) {
                alert("Transaksi Gagal Database Error:\n" + err.message);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        };
    </script>
</body>
</html>
