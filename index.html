<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roti Nusantara POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi loading sederhana */
        .loader { border-top-color: #10b981; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 h-screen flex overflow-hidden">

    <div class="flex-1 flex flex-col h-full">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10">
            <div>
                <h1 class="text-2xl font-bold text-emerald-600">🍞 Roti Nusantara POS</h1>
                <p class="text-sm text-slate-500">Kasir: Rina Maharani (Kasir Utama)</p>
            </div>
            <div id="loadingIndicator" class="hidden items-center gap-2 text-emerald-600 font-semibold">
                <div class="w-5 h-5 border-4 border-emerald-200 border-solid rounded-full loader"></div>
                Sinkronisasi Supabase...
            </div>
        </header>

        <div class="flex-1 overflow-y-auto px-6 py-6">
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                </div>
        </div>
    </div>

    <div class="w-96 bg-white border-l border-slate-200 flex flex-col shadow-xl z-20">
        <div class="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
            <h2 class="text-xl font-bold text-slate-800">🛒 Keranjang</h2>
        </div>

        <div id="cartContainer" class="flex-1 overflow-y-auto p-4 space-y-3">
            <p class="text-center text-slate-400 mt-10">Belum ada pesanan.</p>
        </div>

        <div class="p-6 bg-white border-t border-slate-100">
            <div class="flex justify-between text-slate-500 text-sm mb-2">
                <span>Subtotal</span>
                <span id="subtotalLabel" class="font-medium text-slate-700">Rp 0</span>
            </div>
            <div class="border-t border-slate-200 pt-3 flex justify-between items-center mb-4">
                <span class="font-bold text-slate-800">Total</span>
                <span id="totalLabel" class="font-bold text-2xl text-emerald-600">Rp 0</span>
            </div>
            <button onclick="prosesCheckout()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                Proses Pembayaran
            </button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase.js';

        let products = [];
        let cart = [];

        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        async function fetchProducts() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('loadingIndicator').classList.add('flex');
            
            try {
                const { data, error } = await supabase.from('produk').select('*').eq('is_aktif', true);
                if (error) throw error;
                products = data;
                renderProducts();
            } catch (err) {
                alert("Gagal menarik data dari database: " + err.message);
            } finally {
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('loadingIndicator').classList.remove('flex');
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-4 border border-slate-100 shadow-sm hover:shadow-md cursor-pointer transition-all";
                card.onclick = () => addToCart(p);
                card.innerHTML = `
                    <div class="h-24 bg-emerald-50 rounded-xl mb-3 flex items-center justify-center text-3xl">
                        ${p.kategori === 'Roti' ? '🥖' : p.kategori === 'Minuman' ? '☕' : p.kategori === 'Kue' ? '🍰' : '🍪'}
                    </div>
                    <p class="text-xs text-slate-400 font-mono">${p.kode_produk}</p>
                    <h3 class="font-semibold text-slate-700 leading-tight">${p.nama_produk}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-emerald-600 font-bold">${formatRp(p.harga_jual)}</p>
                        <p class="text-xs text-slate-400">Stok: ${p.stok}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.addToCart = function(product) {
            const existing = cart.find(item => item.id_produk === product.id_produk);
            if (existing) {
                if(existing.jumlah < product.stok) {
                    existing.jumlah += 1;
                    existing.subtotal = existing.jumlah * product.harga_jual;
                } else {
                    alert("Stok tidak mencukupi!");
                }
            } else {
                cart.push({ ...product, jumlah: 1, subtotal: product.harga_jual });
            }
            renderCart();
        }

        window.removeFromCart = function(id) {
            cart = cart.filter(item => item.id_produk !== id);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartContainer');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 mt-10">Belum ada pesanan.</p>';
                document.getElementById('subtotalLabel').innerText = formatRp(0);
                document.getElementById('totalLabel').innerText = formatRp(0);
                return;
            }

            let total = 0;
            cart.forEach(item => {
                total += item.subtotal;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white border border-slate-100 p-3 rounded-xl shadow-sm";
                div.innerHTML = `
                    <div>
                        <h4 class="font-semibold text-slate-700 text-sm">${item.nama_produk}</h4>
                        <p class="text-emerald-600 text-sm font-medium">${formatRp(item.harga_jual)} x ${item.jumlah}</p>
                    </div>
                    <button onclick="removeFromCart(${item.id_produk})" class="text-red-400 hover:text-red-600 text-xl font-bold px-2">&times;</button>
                `;
                container.appendChild(div);
            });

            document.getElementById('subtotalLabel').innerText = formatRp(total);
            document.getElementById('totalLabel').innerText = formatRp(total);
        }

        window.prosesCheckout = async function() {
            if(cart.length === 0) return alert("Keranjang kosong!");

            const btn = document.querySelector('button[onclick="prosesCheckout()"]');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Memproses ke Database...";
            btn.disabled = true;

            try {
                const no_trx = 'TRX-' + Math.floor(Date.now() / 1000); 
                const id_pegawai_dummy = 1; 
                const total_bayar = cart.reduce((sum, item) => sum + item.subtotal, 0);

                const { data: trxData, error: trxError } = await supabase
                    .from('transaksi')
                    .insert([{
                        no_transaksi: no_trx,
                        id_pegawai: id_pegawai_dummy,
                        tgl_transaksi: new Date().toISOString(),
                        metode_bayar: 'Cash',
                        jumlah_uang: total_bayar, 
                        diskon: 0,
                        total_bayar: total_bayar
                    }])
                    .select(); 

                if (trxError) throw trxError;

                const id_transaksi_baru = trxData[0].id_transaksi;

                const detailPayload = cart.map(item => ({
                    id_transaksi: id_transaksi_baru,
                    id_produk: item.id_produk,
                    nama_produk: item.nama_produk,
                    jumlah: item.jumlah,
                    harga_satuan: item.harga_jual,
                    subtotal: item.subtotal
                }));

                const { error: detailError } = await supabase
                    .from('detail_transaksi')
                    .insert(detailPayload);

                if (detailError) throw detailError;

                // Eksekusi Webhook Make.com tanpa syarat!
                const webhookUrl = 'https://hook.eu1.make.com/mhdwdy95a278uwgt1ctork6683eq8fmi'; 
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event: 'transaksi_baru',
                        no_transaksi: no_trx,
                        total: total_bayar,
                        item_terjual: cart.length
                    })
                }).catch(err => console.log("Info: Automation blm tersambung", err));

                alert(`✅ TRANSAKSI BERHASIL!\n\nStruk ${no_trx} sudah tersimpan permanen di Supabase.`);
                cart = [];
                renderCart();

            } catch (err) {
                alert("❌ ERROR DATABASE: " + err.message + "\n\n(Cek apakah ID Pegawai '1' tersedia di tabel pegawai lu, atau matikan RLS sementara di Supabase)");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        fetchProducts();
    </script>
</body>
</html>
